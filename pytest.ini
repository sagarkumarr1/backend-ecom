[pytest]
DJANGO_SETTINGS_MODULE = jwtproject.settings.development
python_files = tests.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    -v
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-omit=*/migrations/*,*/tests/*,manage.py,*/settings/*
